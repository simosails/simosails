<!-- ═══════════════════════════════════════════════════════════
   Lartica Bakehouse — MENU CATEGORIES GRID
   Replace the existing <div class="menu-cta"> block with this.
   Each button opens the modal at the corresponding category.
   ═══════════════════════════════════════════════════════════ -->

<div class="menu-categories-grid" aria-label="Commander par catégorie">

  <!-- Viennoiseries Traditionnelles -->
  <button class="cat-tile" type="button" data-open-order data-product="croissant pain" aria-label="Commander des viennoiseries traditionnelles">
    <svg viewBox="0 0 32 32" aria-hidden="true">
      <!-- Croissant silhouette: arc + layer lines -->
      <path d="M6 22 Q4 12 14 8 Q22 5 26 10 Q30 15 24 22" stroke-width="1.6" fill="none"/>
      <path d="M8 20 Q7 13 15 10" stroke-width="1" opacity="0.5"/>
      <path d="M10 21 Q9 15 17 11" stroke-width="1" opacity="0.35"/>
    </svg>
    <span class="cat-tile-name">Viennoiseries<br>Classiques</span>
    <span class="cat-tile-price">À partir de 6 DH</span>
  </button>

  <!-- Viennoiseries Modernes -->
  <button class="cat-tile" type="button" data-open-order data-product="crokies dubai moderne" aria-label="Commander des viennoiseries modernes">
    <svg viewBox="0 0 32 32" aria-hidden="true">
      <!-- Layered pastry with drizzle -->
      <rect x="7" y="16" width="18" height="5" rx="2.5"/>
      <rect x="9" y="11" width="14" height="5" rx="2.5"/>
      <path d="M13 11 Q14 7 16 9 Q18 7 19 11" stroke-width="1.4" fill="none"/>
      <path d="M11 16 Q13 13 15 15 Q17 13 21 16" stroke-width="1" fill="none" opacity="0.6"/>
    </svg>
    <span class="cat-tile-name">Viennoiseries<br>Modernes</span>
    <span class="cat-tile-price">À partir de 10 DH</span>
  </button>

  <!-- Classiques Marocains -->
  <button class="cat-tile" type="button" data-open-order data-product="kaab ghzal marocain fekkas" aria-label="Commander des classiques marocains">
    <svg viewBox="0 0 32 32" aria-hidden="true">
      <!-- Geometric star / zellige pattern -->
      <polygon points="16,5 18.4,13.2 27,13.2 20.3,18.2 22.7,26.4 16,21.4 9.3,26.4 11.7,18.2 5,13.2 13.6,13.2" stroke-width="1.4" fill="none"/>
      <circle cx="16" cy="16" r="3" stroke-width="1.2" fill="none"/>
    </svg>
    <span class="cat-tile-name">Classiques<br>Marocains</span>
    <span class="cat-tile-price">À partir de 250g</span>
  </button>

  <!-- Formules & Box -->
  <button class="cat-tile" type="button" data-open-order data-product="box plateau formule" aria-label="Commander une formule ou box">
    <svg viewBox="0 0 32 32" aria-hidden="true">
      <!-- Gift box -->
      <rect x="6" y="14" width="20" height="13" rx="2"/>
      <rect x="6" y="9" width="20" height="5" rx="1.5"/>
      <line x1="16" y1="9" x2="16" y2="27"/>
      <path d="M16 9 Q12 6 11 8 Q10 10 16 9" fill="none" stroke-width="1.3"/>
      <path d="M16 9 Q20 6 21 8 Q22 10 16 9" fill="none" stroke-width="1.3"/>
    </svg>
    <span class="cat-tile-name">Formules<br>&amp; Box</span>
    <span class="cat-tile-price">Box à 70 DH</span>
  </button>

  <!-- Cakes & Petites Tartes -->
  <button class="cat-tile" type="button" data-open-order data-product="cake tarte" aria-label="Commander des cakes et tartes">
    <svg viewBox="0 0 32 32" aria-hidden="true">
      <!-- Cake slice -->
      <path d="M16 6 L26 22 Q26 25 23 25 L9 25 Q6 25 6 22 Z" fill="none" stroke-width="1.5"/>
      <path d="M6 22 Q16 19 26 22" fill="none" stroke-width="1.2"/>
      <path d="M8 19 Q16 17 24 19" fill="none" stroke-width="1" opacity="0.5"/>
      <!-- Cherry on top -->
      <circle cx="16" cy="5" r="1.5" stroke-width="1.2" fill="none"/>
      <line x1="16" y1="6.5" x2="16" y2="8" stroke-width="1.2"/>
    </svg>
    <span class="cat-tile-name">Cakes &amp;<br>Petites Tartes</span>
    <span class="cat-tile-price">Pâtisseries indiv.</span>
  </button>

  <!-- Commandes Spéciales -->
  <button class="cat-tile" type="button" data-open-order data-product="mariage événement special" aria-label="Passer une commande spéciale">
    <svg viewBox="0 0 32 32" aria-hidden="true">
      <!-- Crown -->
      <path d="M6 22 L8 12 L13 18 L16 10 L19 18 L24 12 L26 22 Z" fill="none" stroke-width="1.5"/>
      <rect x="6" y="22" width="20" height="3" rx="1.5" stroke-width="1.2" fill="none"/>
      <!-- Crown jewels -->
      <circle cx="16" cy="10" r="1.5" stroke-width="1" fill="none"/>
      <circle cx="8" cy="12" r="1" stroke-width="1" fill="none"/>
      <circle cx="24" cy="12" r="1" stroke-width="1" fill="none"/>
    </svg>
    <span class="cat-tile-name">Commandes<br>Spéciales</span>
    <span class="cat-tile-price">Mariages &amp; événements</span>
  </button>

</div>
